version: '3.9'

services:
  db:
    image: postgres:15
    container_name: credit_db
    environment:
      POSTGRES_DB: credit_db
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: credit_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py ingest_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=credit_db
      - DB_USER=credit_user
      - DB_PASSWORD=credit_pass
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: